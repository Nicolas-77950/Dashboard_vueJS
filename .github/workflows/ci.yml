name: Symfony CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests-backend:
    runs-on: ubuntu-latest
    # On dit à GitHub que toutes les commandes se passent dans le dossier Backend
    defaults:
      run:
        working-directory: ./Backend_Symfony

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: app_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, pdo_pgsql
          
      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Setup Database for tests
        run: |
          php bin/console doctrine:database:create --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/app_test

      - name: Run PHPUnit
        run: php bin/phpunit
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/app_test